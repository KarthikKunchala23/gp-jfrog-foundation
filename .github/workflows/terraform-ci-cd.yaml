---
name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      working_directory:
        default: terraform
        type: string
      aws_region:
        default: ap-south-1
        type: string
      environment:
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  terraform-call:
    uses: KarthikKunchala23/gp-github-workflows/.github/workflows/terraform.yaml@v1.0.0
    permissions:
      id-token: write
      contents: read

    with:
      working_directory: ${{ github.event.inputs.working_directory || 'terraform' }}
      aws_region: ${{ github.event.inputs.aws_region || 'ap-south-1' }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
    